<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 资讯速递</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #fff;
      --text: #1d1d1f;
      --text-2: #6e6e73;
      --accent: #0071e3;
      --border: #e5e5e7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* header */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245,245,247,0.88);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .header-top h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-actions .updated { font-size: 11px; color: var(--text-2); }
    .btn-icon {
      background: none; border: none; font-size: 18px; cursor: pointer;
      width: 34px; height: 34px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; transition: background 0.15s;
    }
    .btn-icon:active { background: #e5e5e7; }
    .fav-btn-header { position: relative; }
    .fav-badge {
      position: absolute; top: -2px; right: -2px;
      background: #ff3b30; color: #fff; font-size: 10px;
      min-width: 16px; height: 16px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-weight: 600;
    }

    /* main tabs */
    .main-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      background: rgba(245,245,247,0.5);
    }
    .main-tab {
      flex: 1; max-width: 140px;
      padding: 10px 0 8px;
      text-align: center;
      font-size: 15px; font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .main-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    /* sub tabs (for ranking) */
    .sub-tabs {
      display: flex;
      padding: 10px 16px;
      gap: 8px;
    }
    .sub-tab {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .sub-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* content area */
    .content { display: none; }
    .content.active { display: block; }

    /* news list */
    .news-list {
      max-width: 680px; margin: 0 auto;
      padding: 8px 16px 80px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .card {
      background: var(--card-bg); border-radius: 14px; padding: 14px;
      border: 1px solid var(--border);
      transition: transform 0.1s, box-shadow 0.15s;
      display: block; text-decoration: none; color: inherit; position: relative;
    }
    .card:active { transform: scale(0.985); }
    @media (min-width: 680px) {
      .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    }
    .card-top { display: flex; align-items: flex-start; gap: 10px; }
    .card-body { flex: 1; min-width: 0; }
    .card-meta {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap;
    }
    .card-source {
      font-size: 11px; font-weight: 600; color: var(--accent);
      background: #e8f2fd; padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    }
    .card-date { font-size: 11px; color: var(--text-2); }
    .card-hot {
      font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    }
    .card-hot.high { background: #fff3e0; color: #e65100; }
    .card-hot.mid { background: #fff8e1; color: #f9a825; }
    .card-hot.low { background: #f5f5f5; color: #999; }
    .card-title {
      font-size: 16px; font-weight: 600; line-height: 1.4; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-summary {
      font-size: 13px; line-height: 1.5; color: var(--text-2);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-fav {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
      border: none; background: #f5f5f7; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .card-fav:active { transform: scale(1.3); }
    .card-fav.faved { background: #fff3e0; }

    /* rank number badge */
    .rank-num {
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .rank-num.top1 { background: #ff3b30; color: #fff; }
    .rank-num.top2 { background: #ff6d3b; color: #fff; }
    .rank-num.top3 { background: #ff9500; color: #fff; }
    .rank-num.normal { background: #e5e5e7; color: #999; }

    /* loading / empty */
    .loading, .empty {
      text-align: center; padding: 80px 20px; color: var(--text-2); font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* favorites panel */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 50; display: none; opacity: 0; transition: opacity 0.2s;
    }
    .overlay.show { display: block; opacity: 1; }
    .fav-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 90%; max-width: 400px;
      background: #fff; z-index: 60; transform: translateX(100%);
      transition: transform 0.25s ease; display: flex; flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,0.1);
    }
    .fav-panel.show { transform: translateX(0); }
    .fav-panel-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .fav-panel-header h3 { font-size: 17px; }
    .fav-panel-header button {
      background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-2);
    }
    .fav-panel-list { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .fav-empty { text-align: center; padding: 60px 20px; color: var(--text-2); font-size: 14px; }
    .fav-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px; background: #f9f9fa; border-radius: 12px;
    }
    .fav-item-body { flex: 1; min-width: 0; }
    .fav-item-title {
      font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .fav-item-source { font-size: 11px; color: var(--accent); }
    .fav-item-del {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      border: none; background: #ffe5e5; color: #ff3b30; font-size: 14px; cursor: pointer;
    }

    /* refresh btn */
    .refresh-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 7px 16px; border-radius: 18px; font-size: 13px; font-weight: 500;
      cursor: pointer;
    }
    .refresh-btn:active { opacity: 0.7; }

    /* toast */
    .toast {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
      background: #1d1d1f; color: #fff; padding: 8px 20px;
      border-radius: 20px; font-size: 13px; z-index: 70;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <h1>AI 资讯速递</h1>
      <div class="header-actions">
        <span class="updated" id="updateTime">加载中…</span>
        <button class="refresh-btn" onclick="loadAll()">刷新</button>
        <button class="btn-icon fav-btn-header" onclick="openFav()" title="收藏夹">
          ⭐
          <span class="fav-badge" id="favBadge" style="display:none">0</span>
        </button>
      </div>
    </div>
    <div class="main-tabs">
      <button class="main-tab active" data-tab="recommend" onclick="switchMain('recommend')">📰 推荐</button>
      <button class="main-tab" data-tab="ranking" onclick="switchMain('ranking')">🔥 排行榜</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <!-- ===== 推荐页 ===== -->
  <div class="content active" id="content-recommend">
    <div class="news-list" id="recommendList"></div>
  </div>

  <!-- ===== 排行榜页 ===== -->
  <div class="content" id="content-ranking">
    <div class="sub-tabs">
      <button class="sub-tab active" data-sub="daily" onclick="switchSub('daily')">今日热搜</button>
      <button class="sub-tab" data-sub="weekly" onclick="switchSub('weekly')">本周热搜</button>
    </div>
    <div class="news-list" id="rankingList"></div>
  </div>

  <!-- ===== 收藏夹面板 ===== -->
  <div class="overlay" id="overlay" onclick="closeFav()"></div>
  <div class="fav-panel" id="favPanel">
    <div class="fav-panel-header">
      <h3>⭐ 我的收藏</h3>
      <button onclick="closeFav()">✕</button>
    </div>
    <div class="fav-panel-list" id="favList"></div>
  </div>

  <script>
    // ======= STATE =======
    let newsData = null;
    let mainTab = "recommend";
    let subTab = "daily";
    const FAV_KEY = "ai-news-favorites";

    // ======= FAVORITES =======
    function getFavs() {
      try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); }
      catch { return []; }
    }
    function saveFavs(favs) { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }
    function isFaved(link) { return getFavs().some(f => f.link === link); }
    function findItemByLink(link) {
      if (!newsData) return null;
      return newsData.items.find(i => i.link === link) ||
             (newsData.daily || []).find(i => i.link === link) ||
             (newsData.weekly || []).find(i => i.link === link);
    }
    function toggleFavByLink(linkEncoded) {
      const link = decodeURIComponent(linkEncoded);
      const item = findItemByLink(link);
      if (!item) return;
      let favs = getFavs();
      const idx = favs.findIndex(f => f.link === link);
      if (idx > -1) { favs.splice(idx, 1); }
      else { favs.push({ title: item.title, link: item.link, source: item.source, date: item.date }); }
      saveFavs(favs);
      updateFavBadge();
      renderCurrent();
      showToast(isFaved(link) ? "已收藏 ⭐" : "已取消收藏");
    }
    function updateFavBadge() {
      const n = getFavs().length;
      const badge = document.getElementById("favBadge");
      if (n > 0) { badge.style.display = "flex"; badge.textContent = n; }
      else { badge.style.display = "none"; }
    }

    // ======= RENDER =======
    function hotLabel(score) {
      if (score >= 60) return '<span class="card-hot high">🔥 ' + score + '</span>';
      if (score >= 35) return '<span class="card-hot mid">🔥 ' + score + '</span>';
      return '';
    }
    function makeCard(item, idx) {
      const faved = isFaved(item.link);
      const linkEncoded = encodeURIComponent(item.link);
      const scoreHtml = item.hotScore != null ? hotLabel(item.hotScore) : '';
      const idxHtml = idx != null ? '<span class="rank-num ' + (idx < 3 ? 'top' + (idx+1) : 'normal') + '">' + (idx+1) + '</span>' : '';
      return `
        <div class="card" style="cursor:default" data-link="${esc(item.link)}">
          <div class="card-top">
            ${idxHtml}
            <div class="card-body">
              <div class="card-meta">
                <span class="card-source">${esc(item.source)}</span>
                <span class="card-date">${timeAgo(item.date)}</span>
                ${scoreHtml}
              </div>
              <a href="${esc(item.link)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">
                <div class="card-title">${esc(item.title)}</div>
                ${item.summary ? '<div class="card-summary">' + esc(item.summary) + '</div>' : ''}
              </a>
            </div>
            <button class="card-fav ${faved ? 'faved' : ''}" onclick="event.stopPropagation();toggleFavByLink('${linkEncoded}')">${faved ? '★' : '☆'}</button>
          </div>
        </div>`;
    }

    function renderList(el, items, showRank) {
      if (!items || items.length === 0) { el.innerHTML = '<div class="empty">暂无内容</div>'; return; }
      el.innerHTML = items.map((item, i) => makeCard(item, showRank ? i : null)).join("");
    }

    function renderCurrent() {
      if (!newsData) return;
      if (mainTab === "recommend") {
        renderList(document.getElementById("recommendList"), newsData.items, false);
      } else {
        const data = subTab === "daily" ? newsData.daily : newsData.weekly;
        renderList(document.getElementById("rankingList"), data, true);
      }
    }

    // ======= DATA LOADING =======
    async function loadAll(refresh) {
      const main = mainTab === "recommend" ? document.getElementById("recommendList") : document.getElementById("rankingList");
      main.innerHTML = '<div class="loading"><div class="spinner"></div>加载中…</div>';
      try {
        const res = await fetch('news.json?t=' + Date.now());
        if (!res.ok) throw new Error("HTTP " + res.status);
        newsData = await res.json();
        document.getElementById("updateTime").textContent = "更新于 " + formatDate(newsData.updated);
        renderCurrent();
        updateFavBadge();
        if (refresh) showToast("已刷新 ✓");
      } catch (e) {
        main.innerHTML = '<div class="empty">加载失败，请重试</div>';
        console.error(e);
      }
    }

    // ======= TAB SWITCHING =======
    function switchMain(tab) {
      mainTab = tab;
      document.querySelectorAll(".main-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
      document.getElementById("content-recommend").classList.toggle("active", tab === "recommend");
      document.getElementById("content-ranking").classList.toggle("active", tab === "ranking");
      renderCurrent();
    }
    function switchSub(tab) {
      subTab = tab;
      document.querySelectorAll(".sub-tab").forEach(t => t.classList.toggle("active", t.dataset.sub === tab));
      renderCurrent();
    }

    // ======= FAV PANEL =======
    function openFav() {
      document.getElementById("overlay").classList.add("show");
      document.getElementById("favPanel").classList.add("show");
      renderFavPanel();
    }
    function closeFav() {
      document.getElementById("overlay").classList.remove("show");
      document.getElementById("favPanel").classList.remove("show");
    }
    function renderFavPanel() {
      const favs = getFavs();
      const el = document.getElementById("favList");
      if (favs.length === 0) {
        el.innerHTML = '<div class="fav-empty">还没有收藏<br>点击新闻右侧的 ☆ 即可收藏</div>';
        return;
      }
      el.innerHTML = favs.map(f => `
        <div class="fav-item">
          <div class="fav-item-body">
            <a href="${esc(f.link)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">
              <div class="fav-item-title">${esc(f.title)}</div>
            </a>
            <span class="fav-item-source">${esc(f.source)}</span>
          </div>
          <button class="fav-item-del" onclick="event.stopPropagation();removeFavByEncoded('${encodeURIComponent(f.link)}')">✕</button>
        </div>
      `).join("");
    }
    function removeFavByEncoded(linkEncoded) {
      const link = decodeURIComponent(linkEncoded);
      let favs = getFavs();
      favs = favs.filter(f => f.link !== link);
      saveFavs(favs);
      updateFavBadge();
      renderFavPanel();
      renderCurrent();
      showToast("已移除");
    }

    // ======= UTILS =======
    function esc(s) { const m = {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}; return String(s).replace(/[&<>"']/g, c => m[c]); }
    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const min = Math.floor(diff / 60000);
      if (min < 1) return "刚刚";
      if (min < 60) return min + " 分钟前";
      const hr = Math.floor(min / 60);
      if (hr < 24) return hr + " 小时前";
      return Math.floor(hr / 24) + " 天前";
    }
    function formatDate(iso) {
      const d = new Date(iso);
      return (d.getMonth()+1) + "月" + d.getDate() + "日 " + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
    }
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    // ======= INIT =======
    loadAll();
  </script>
</body>
</html>
